                setIsTableLoading(false);

                if (!isCloudConfigured) return;

                async function initializeCloudSchema() {
                    try {
                        const { data, error } = await supabase.from('ledger').select('*');
                        if (error) throw error;
                        
                        if (data && data.length > 0) {
                            setProjects(data);
                        }
                    } catch (err) {
                        console.error("Cloud connection issue:", err);
                    }
                }

                initializeCloudSchema();

                // Live WebSockets Feed Handler setup
                const realtimeChannel = supabase.channel('realtime_ledger_feed')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'ledger' }, (payload) => {
                        if (payload.eventType === 'INSERT') {
                            setProjects(prev => prev.some(p => p.id === payload.new.id) ? prev : [payload.new, ...prev]);
                        } else if (payload.eventType === 'UPDATE') {
                            setProjects(prev => prev.map(p => p.id === payload.new.id ? payload.new : p));
                        } else if (payload.eventType === 'DELETE') {
                            setProjects(prev => prev.filter(p => p.id !== payload.old.id));
                        }
                    })
                    .subscribe();

                return () => {
                    supabase.removeChannel(realtimeChannel);
                };
            }, []);

                                                let statusColor = 'bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100';
                                                if (project.status === 'Not handover') statusColor = 'bg-sky-50 text-solar-primary border-sky-200 hover:bg-sky-100';
                                                else if (project.status === 'Last payment against PN') statusColor = 'bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100';

                                                return (
                                                    <tr key={project.id} className="hover:bg-slate-50/70 transition-colors group">
                                                        <td className="px-5 py-3.5 text-center font-mono font-bold text-solar-textDark">{project.orderNo}</td>
                                                        <td className="px-4 py-3.5 font-mono text-solar-textMuted">{project.year}</td>
                                                        <td className="px-5 py-3.5 font-bold text-solar-textDark truncate max-w-xs">{project.customer}</td>
                                                        <td className="px-5 py-3.5 text-solar-textMuted truncate max-w-sm" title={project.desc}>{project.desc}</td>
                                                        <td className="px-5 py-3.5 text-right font-mono font-bold text-solar-textDark">{formatCurrency(project.value)}</td>
                                                        <td className="px-5 py-3.5 text-right font-mono">
                                                            <div className="font-bold text-slate-700">{formatCurrency(project.collection)}</div>
                                                            {remainingToCollect > 0.01 && (
                                                                <div className="text-[10px] font-sans font-semibold text-solar-accentAmber mt-0.5 whitespace-nowrap">To Collect: {formatCurrency(remainingToCollect)}</div>
                                                            )}
                                                        </td>
                                                        <td className="px-5 py-3.5 text-right font-mono font-bold text-solar-primary">{formatCurrency(project.profit)}</td>
                                                        <td className="px-5 py-3.5 text-center whitespace-nowrap">
                                                            <div className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-slate-50 border border-slate-200/60 rounded-md text-[11px] font-bold font-mono">
                                                                <span className="text-solar-primary">{afaqPct}%</span><span className="text-slate-300 font-normal">/</span><span className="text-solar-accentGreen">{jubileePct}%</span>
                                                            </div>
                                                        </td>
                                                        <td className="px-5 py-3.5 text-center relative">
                                                            {isAdmin ? (
                                                                <button 
                                                                    onClick={(e) => { e.stopPropagation(); setActiveStatusChangerId(activeStatusChangerId === project.id ? null : project.id); }}
                                                                    className={`px-3 py-1 rounded-full text-[10px] font-bold border transition-all shadow-sm flex items-center justify-center gap-1.5 mx-auto ${statusColor}`}
                                                                >
                                                                    {project.status}<i className="fa-solid fa-chevron-down text-[8px] opacity-60"></i>
                                                                </button>
                                                            ) : (
                                                                <span className={`px-3 py-1 rounded-full text-[10px] font-bold border flex items-center justify-center w-max mx-auto select-none ${statusColor.split('hover:')[0]}`}>{project.status}</span>
                                                            )}

                                                            {isAdmin && activeStatusChangerId === project.id && (
                                                                <div className="absolute left-1/2 transform -translate-x-1/2 mt-1 w-48 bg-white border border-solar-border rounded-lg shadow-xl z-20 overflow-hidden text-left animate-fade-in">
                                                                    {['Completed', 'Not handover', 'Last payment against PN'].map(statusOption => (
                                                                        <button
                                                                            key={statusOption} onClick={() => handleStatusQuickChange(project.id, statusOption)}
                                                                            className={`w-full text-left px-4 py-2.5 text-[11px] hover:bg-slate-50 transition-colors flex items-center gap-2 ${project.status === statusOption ? 'text-solar-primary font-bold bg-sky-50/50' : 'text-solar-textDark'}`}
                                                                        >
                                                                            <span className={`w-1.5 h-1.5 rounded-full ${statusOption === 'Completed' ? 'bg-emerald-500' : statusOption === 'Not handover' ? 'bg-sky-500' : 'bg-purple-500'}`}></span>{statusOption}
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="px-5 py-3.5 text-right">
                                                            {isAdmin ? (
                                                                <div className="flex justify-end gap-2 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <button onClick={() => openEditModal(project)} className="p-1.5 bg-slate-100 hover:bg-sky-50 hover:text-solar-primary rounded text-solar-textMuted transition-colors border border-slate-200"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                                                    <button onClick={() => handleDelete(project.id)} className="p-1.5 bg-red-50 hover:bg-red-500 hover:text-white rounded text-red-600 transition-colors border border-red-100"><i className="fa-solid fa-trash-can text-[10px]"></i></button>
                                                                </div>
                                                            ) : (
                                                                <div className="flex justify-end text-slate-300 text-xs px-2 select-none"><i className="fa-solid fa-lock opacity-35"></i></div>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {filteredProjects.length === 0 && (
                                                <tr>
                                                    <td colSpan="10" className="px-6 py-16 text-center text-solar-textMuted">
                                                        <i className="fa-solid fa-solar-panel text-3xl text-slate-300 mb-3 block"></i>
                                                        <p className="text-xs font-bold text-solar-textDark">No active solar project lines matching filters</p>
                                                        <p className="text-[11px] mt-0.5">Adjust filter parameters or unlock admin console to append new records.</p>
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </main>
                    </div>

                    {/* Security Authentication Prompt */}
                    {isAuthModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white border border-solar-border rounded-xl w-full max-w-sm shadow-2xl p-6">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="bg-sky-50 text-solar-primary p-2.5 rounded-xl border border-sky-100"><i className="fa-solid fa-shield-halved text-lg"></i></div>
                                    <div>
                                        <h3 className="text-sm font-bold text-solar-textDark">Admin Authorization</h3>
                                        <p className="text-[11px] text-solar-textMuted">Unlock administrative pipeline modification engines</p>
                                    </div>
                                </div>
                                <form onSubmit={handleAuthSubmit} className="flex flex-col gap-4">
                                    <div>
                                        <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Platform Secret Key</label>
                                        <input 
                                            type="password" placeholder="••••••••" value={enteredPassword}
                                            onChange={(e) => { setEnteredPassword(e.target.value); setPasswordError(false); }}
                                            className={`w-full bg-solar-bgMain border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none tracking-widest ${passwordError ? 'border-red-500' : 'border-solar-border'}`} autoFocus
                                        />
                                        {passwordError && <p className="text-[10px] text-red-600 font-semibold mt-1">Incorrect credentials. Authentication failed.</p>}
                                    </div>
                                    <div className="flex justify-end gap-2 pt-2">
                                        <button type="button" onClick={() => { setIsAuthModalOpen(false); setEnteredPassword(''); setPasswordError(false); }} className="px-3 py-1.5 bg-slate-100 text-solar-textMuted rounded-lg text-xs font-semibold">Cancel</button>
                                        <button type="submit" className="px-4 py-1.5 bg-solar-primary text-white rounded-lg text-xs font-bold shadow-sm">Verify Access</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Dynamic Add / Edit Dialog */}
                    {isModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-50 overflow-y-auto bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white border border-solar-border rounded-xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl animate-fade-in my-auto overflow-hidden">
                                <div className="px-6 py-4 border-b border-solar-border flex justify-between items-center bg-slate-50 shrink-0">
                                    <h3 className="text-sm font-bold text-solar-textDark flex items-center gap-2">
                                        <div className="bg-[#0081C9] w-7 h-7 rounded-[8px] flex items-center justify-center text-white shrink-0 shadow-sm"><i className="fa-solid fa-solar-panel text-xs"></i></div>
                                        <span className="font-black tracking-tight text-[#0A1128] ml-1">AFAQ</span><span className="font-normal text-[#475569] -ml-1">Renewables</span>
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-solar-textDark focus:outline-none"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>

                                <form onSubmit={handleFormSubmit} className="p-4 sm:p-6 flex-1 overflow-y-auto flex flex-col gap-4 sm:gap-5">
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Order No</label>
                                            <input type="text" placeholder="e.g. 2038" value={currentProject.orderNo} onChange={(e) => setCurrentProject(prev => ({ ...prev, orderNo: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Year</label>
                                            <select value={currentProject.year} onChange={(e) => setCurrentProject(prev => ({ ...prev, year: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none">
                                                <option value={2025}>2025</option><option value={2026}>2026</option><option value={2027}>2027</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Execution Status</label>
                                            <select value={currentProject.status} onChange={(e) => setCurrentProject(prev => ({ ...prev, status: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none">
                                                <option value="Completed">Completed</option><option value="Not handover">Not handover</option><option value="Last payment against PN">Last payment against PN</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Customer / Client Name *</label>
                                            <input type="text" placeholder="e.g. Tawreed Co. LLC" required value={currentProject.customer} onChange={(e) => setCurrentProject(prev => ({ ...prev, customer: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Technical Scope & Description *</label>
                                            <input type="text" placeholder="e.g. Supply of PV panels" required value={currentProject.desc} onChange={(e) => setCurrentProject(prev => ({ ...prev, desc: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 border-t border-solar-border pt-4">
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Order Value (SAR)</label>
                                            <input type="number" step="any" value={currentProject.value} onChange={(e) => setCurrentProject(prev => ({ ...prev, value: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Billed / Invoiced Volume (SAR)</label>
                                            <input type="number" step="any" value={currentProject.billed} onChange={(e) => setCurrentProject(prev => ({ ...prev, billed: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Total Cash Collected (SAR)</label>
                                            <input type="number" step="any" value={currentProject.collection} onChange={(e) => setCurrentProject(prev => ({ ...prev, collection: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 border-t border-solar-border pt-4">
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Net Joint Profit (SAR)</label>
                                            <input type="number" step="any" value={currentProject.profit} onChange={(e) => setCurrentProject(prev => ({ ...prev, profit: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">AFAQ Share Profit (SAR)</label>
                                            <input type="number" step="any" value={currentProject.afaqProfit} onChange={(e) => setCurrentProject(prev => ({ ...prev, afaqProfit: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-solar-textMuted mb-1.5">Jubilee Bros Profit (SAR)</label>
                                            <input type="number" step="any" value={currentProject.jubileeProfit} onChange={(e) => setCurrentProject(prev => ({ ...prev, jubileeProfit: e.target.value }))} className="w-full bg-solar-bgMain border border-solar-border rounded-lg px-3 py-2 text-xs text-solar-textDark focus:outline-none" />
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-3 rounded-lg border border-solar-border flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shrink-0">
                                        <div>
                                            <p className="text-[10px] font-bold text-solar-textDark uppercase">Automated JV Profit Splitting Tool</p>
                                            <p className="text-[9px] text-solar-textMuted">Standard distribution policies agreed for KSA operations.</p>
                                        </div>
                                        <div className="flex gap-2 w-full sm:w-auto">
                                            <button type="button" onClick={() => runAutoSplit('afaq100')} className="flex-1 sm:flex-initial text-center px-2 py-1 bg-sky-50 border border-sky-200 rounded text-solar-primary text-[10px] font-bold hover:bg-solar-primary hover:text-white transition-colors">AFAQ 100%</button>
                                            <button type="button" onClick={() => runAutoSplit('split50')} className="flex-1 sm:flex-initial text-center px-2 py-1 bg-emerald-50 border border-emerald-200 rounded text-solar-accentGreen text-[10px] font-bold hover:bg-solar-accentGreen hover:text-white transition-colors">50/50 Split</button>
                                        </div>
                                    </div>

                                    <div className="border-t border-solar-border pt-4 flex justify-end gap-3 shrink-0">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 bg-slate-100 text-solar-textMuted rounded-lg text-xs font-semibold">Cancel</button>
                                        <button type="submit" className="px-5 py-2 bg-solar-primary text-white rounded-lg text-xs font-bold shadow-sm">Save Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className={`fixed bottom-5 right-5 z-[200] px-4 py-2.5 rounded-lg text-xs font-bold text-white shadow-xl flex items-center gap-2 ${
                            notification.type === 'error' ? 'bg-red-600' : notification.type === 'warning' ? 'bg-amber-600' : 'bg-emerald-600'
                        }`}>
                            <i className={`fa-solid ${notification.type === 'error' ? 'fa-circle-exclamation' : notification.type === 'warning' ? 'fa-triangle-exclamation' : 'fa-circle-check'}`}></i>
                            {notification.message}
                        </div>
                    )}

                </div>
            );
        }

        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
